apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: gitops-demo
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <title>GitOps Demo</title>
        <style>
            body { font-family: Arial; text-align: center; padding: 50px; background-color: #f0f8ff; }
            .version { color: blue; font-size: 28px; margin: 20px; font-weight: bold; }
            .status { color: green; }
        </style>
    </head>
    <body>
        <h1>✅ GitOps avec ArgoCDDD</h1>
        <div class="version">Version 3.0 (Stable)</div>
        <p class="status">🟢 Application deployee depuis Git</p>
        <p>Derniere synchronisation: <span id="time"></span></p>
        <script>document.getElementById('time').innerText = new Date().toLocaleString();</script>
    </body>
    </html>
